url: https://jcunow.github.io/RootScanR/

template:
  bootstrap: 5
  theme: breeze-light
  light-switch: true
  bslib:
    base_font:
      google: Roboto
    heading_font:
      google: Aleo
    code_font:
      google: JetBrains Mono

search: true

home:
  title: "RootScanR: Extract Root Traits from Images"
  description: "R tools for extracting root traits from flatbed and minirhizotron images"

navbar:
  left:
    - text: Tutorial
      menu:
        - text: "Start here: Batch Processing"
          href: articles/BatchProcessing_vignette.html
        - text: "-------"
        - text: Flatbed Scans (step-by-step)
          href: articles/FlatBedScans_vignettes.html
        - text: Minirhizotron Scans (step-by-step)
          href: articles/MinirhizotronScans_vignettes.html
        - text: Rotation Bias Correction
          href: articles/Rotation_Bias_vignettes.html
    - text: News
      href: news/index.html
    - text: Function Index
      href: reference/index.html
    - text: Package Structure
      href: articles/pkgnetreport.html
  structure:
    right: [search, github, lightswitch]

reference:
  - title: "Batch processing"
    desc: "High-level wrapper that runs a full depth-profile analysis over a directory of images."
    contents:
      - root_depth_metrics

  - title: "Image loading and preprocessing"
    desc: "Functions for loading, cleaning, thresholding, and transforming root images."
    contents:
      - load_flexible_image
      - clean_image
      - image_threshold
      - rgb2gray
      - rotation_censor
      - skeletonize_image

  - title: "Root traits"
    desc: "Per-image trait extraction: length, diameter, architecture, and spatial metrics."
    contents:
      - root_length
      - root_diameter
      - detect_skeleton_points
      - count_pixels
      - deep_drive
      - root_scape_metrics


  - title: "Root branching order"
    desc: "Convert a root skeleton into a segment graph, assign tip/root/branch
      order, and summarise root architecture by order class."
    contents:
      - branch_order_map
      - root_graph_pipeline
      - order_metrics
      - summarize_orders
      - convert_root_units
      - order_classification_map
      - prune_terminal_segments
      - render_order_overlay
      - plot_order_window

  - title: "Depth mapping"
    desc: "Functions for constructing and binning depth maps from minirhizotron geometry."
    contents:
      - create_depthmap
      - binning
      - estimate_soil_surface
      - estimate_rotation_center
      - estimate_rotation_shift

  - title: "Soil and colour characterisation"
    desc: "Colour metrics, peat classification, and texture analysis."
    contents:
      - create_root_buffer
      - tube_coloration
      - analyze_soil_texture
      - classify_peat_rgb
      - build_peat_centroids
      - plot_peat_classification

  - title: "Distribution analysis"
    desc: "Statistical indices summarising root distribution with depth."
    contents:
      - MRD
      - RPI
      - rhythmicity
      - modal_peaks
      - circular_mean
      - root_accumulation
      - compare_depth_distribution

  - title: "Rotation bias"
    desc: "Detect and correct for rotational artefacts in minirhizotron tube scans."
    contents:
      - slice_rotation
      - fit_sine_curve
      - rhythmicity
      


  - title: "Example data"
    desc: "Built-in example images from the Oulanka 2023 field campaign."
    contents:
      - seg_Oulanka2023_Session01_T067
      - seg_Oulanka2023_Session03_T067
      - skl_Oulanka2023_Session01_T067
      - skl_Oulanka2023_Session03_T067
      - rgb_Oulanka2023_Session03_T067
      - TurnoverDPC_data
